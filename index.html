<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Protocolo de reinicialização em andamento." />
  <title>Erro 004 — Reinicialização</title>

  <style>
    :root {
      --bg: #000000;
      --fg: #f4f4f4;
      --pink: #ff0a78;
      --muted: #707070;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Courier New", Courier, monospace;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 24px;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.045;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.11) 0,
          rgba(255, 255, 255, 0.11) 1px,
          transparent 1px,
          transparent 3px
        );
      mix-blend-mode: screen;
    }

    .screen {
      width: min(100%, 820px);
      min-height: min(760px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .error {
      margin: 0 0 38px;
      font-size: clamp(1.1rem, 3.5vw, 1.75rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }

    .cursor {
      display: inline-block;
      width: 0.75em;
      height: 0.14em;
      margin-left: 0.16em;
      vertical-align: middle;
      background: var(--pink);
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }

    .status {
      margin: 0;
      font-size: clamp(1.85rem, 6vw, 4.2rem);
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: -0.045em;
      text-transform: lowercase;
    }

    .progress-wrap {
      margin: 52px 0 42px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 12px;
      font-size: clamp(0.72rem, 2.2vw, 0.95rem);
      color: var(--muted);
      text-transform: lowercase;
    }

    .progress-track {
      width: 100%;
      height: 14px;
      border: 1px solid var(--fg);
      padding: 2px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--pink);
      transition: width 0.5s linear;
    }

    .remaining {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: clamp(0.78rem, 2.4vw, 1rem);
      text-transform: lowercase;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .unit {
      min-width: 0;
      border-top: 1px solid var(--fg);
      padding-top: 13px;
    }

    .number {
      display: block;
      color: var(--pink);
      font-size: clamp(2rem, 8vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .label {
      display: block;
      margin-top: 9px;
      color: var(--muted);
      font-size: clamp(0.62rem, 2vw, 0.86rem);
      text-transform: lowercase;
    }

    .system-line {
      margin-top: 50px;
      color: var(--pink);
      font-size: clamp(0.72rem, 2.2vw, 0.96rem);
      text-transform: lowercase;
    }

    .revealed {
      display: none;
      color: var(--pink);
      font-size: clamp(2.6rem, 9vw, 6.8rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      text-transform: lowercase;
    }

    @media (max-width: 620px) {
      body {
        padding: 20px;
      }

      .screen {
        min-height: calc(100vh - 40px);
      }

      .countdown {
        grid-template-columns: repeat(2, 1fr);
        gap: 22px 14px;
      }

      .progress-wrap {
        margin: 42px 0 34px;
      }
    }
  </style>
</head>

<body>
  <div class="noise"></div>

  <main class="screen" aria-live="polite">
    <section id="countdown-screen">
      <p class="error">erro 004:<span class="cursor"></span></p>

      <h1 class="status">
        reinicialização<br />
        em andamento
      </h1>

      <div class="progress-wrap">
        <div class="progress-labels">
          <span>protocolo ativo</span>
          <span id="percent">00%</span>
        </div>

        <div class="progress-track" aria-label="Progresso da contagem regressiva">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <p class="remaining">faltam</p>

      <div class="countdown">
        <div class="unit">
          <span class="number" id="days">15</span>
          <span class="label">dias</span>
        </div>

        <div class="unit">
          <span class="number" id="hours">00</span>
          <span class="label">horas</span>
        </div>

        <div class="unit">
          <span class="number" id="minutes">00</span>
          <span class="label">minutos</span>
        </div>

        <div class="unit">
          <span class="number" id="seconds">00</span>
          <span class="label">segundos</span>
        </div>
      </div>

      <div class="system-line">&gt;&gt; persepolis.system</div>
    </section>

    <section class="revealed" id="revealed">
      o sistema<br />
      foi reiniciado.
    </section>
  </main>

  <script>
    const startDate = new Date("2026-07-18T19:00:00-03:00");
    const targetDate = new Date("2026-08-02T19:00:00-03:00");
    const totalDuration = targetDate.getTime() - startDate.getTime();

    const pad = (value) => String(value).padStart(2, "0");

    function updateCountdown() {
      const now = new Date();
      const remaining = targetDate.getTime() - now.getTime();

      if (remaining <= 0) {
        document.getElementById("countdown-screen").style.display = "none";
        document.getElementById("revealed").style.display = "block";
        return;
      }

      const elapsed = Math.max(0, now.getTime() - startDate.getTime());
      const progress = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));

      const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
      const hours = Math.floor((remaining / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((remaining / (1000 * 60)) % 60);
      const seconds = Math.floor((remaining / 1000) % 60);

      document.getElementById("days").textContent = pad(days);
      document.getElementById("hours").textContent = pad(hours);
      document.getElementById("minutes").textContent = pad(minutes);
      document.getElementById("seconds").textContent = pad(seconds);

      document.getElementById("progress-bar").style.width = `${progress}%`;
      document.getElementById("percent").textContent = `${Math.floor(progress)}%`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
